  /* cinematic vignette */
  .vignette {
    position:fixed; inset:0; z-index:2; pointer-events:none;
    background:radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.55) 100%);
    transition:opacity 3s ease;
  }

  /* glow halo behind heart — blooms on fill */
  #heartGlow {
    position:absolute; width:420px; height:420px;
    border-radius:50%; z-index:3; pointer-events:none;
    background:radial-gradient(ellipse at center, rgba(255,150,180,0) 0%, rgba(255,80,130,0) 100%);
    transform:translate(-50%,-50%); left:50%; top:50%;
    transition:background 2s ease, box-shadow 2s ease;
    filter:blur(28px);
  }
  #heartGlow.lit {
    background:radial-gradient(ellipse at center, rgba(255,160,195,0.45) 0%, rgba(220,60,110,0.08) 70%, transparent 100%);
    box-shadow:0 0 80px 40px rgba(255,120,165,0.18);
  }

  .center {
    position:relative; z-index:10;
    display:flex; flex-direction:column;
    align-items:center; gap:26px;
    padding:40px 20px;
  }

  .heart-wrap {
    width:290px; height:290px;
    cursor:pointer; user-select:none;
    -webkit-tap-highlight-color:transparent;
    position:relative;
    filter:drop-shadow(0 0 0px rgba(255,100,150,0));
    transition:filter 2s ease;
  }
  .heart-wrap.glowing {
    filter:drop-shadow(0 0 28px rgba(255,90,140,0.75)) drop-shadow(0 0 60px rgba(220,50,100,0.4));
    animation:hb 2s ease-in-out infinite;
  }
  @keyframes hb {
    0%,100%{ transform:scale(1); }
    35%{ transform:scale(1.04); }
    65%{ transform:scale(0.975); }
  }

  canvas { width:100%; height:100%; display:block; }

  /* sticker between heart and text */
  .sticker { width:96px; height:96px; margin:-72px auto 8px; display:flex; align-items:center; justify-content:center; z-index:12; }
  .sticker-img { width:72px; height:72px; object-fit:contain; display:block; }

  .text-label {
    font-family:'Cormorant Garamond',Georgia,serif;
    font-size:clamp(14px,3vw,18px);
    font-weight:300; letter-spacing:0.14em;
    text-align:center; line-height:1.7;
    max-width:360px; padding:0 20px;
    transition:opacity 0.8s ease, color 2s ease, text-shadow 2s ease;
  }
  #text1 { color:rgba(210,200,205,0.8); }
  #text1.colorful { color:rgba(255,220,235,0.95); text-shadow:0 0 20px rgba(255,120,165,0.5); }
  #text1.hide { opacity:0; pointer-events:none; }

  #text2 {
    opacity:0; font-style:normal;
    font-size:clamp(13px,2.6vw,16px); letter-spacing:0.09em;
    color:#000; font-weight:700; transition:opacity 1.6s ease, color 1.6s ease;
  }
  #text2.show { opacity:1; color:#000; font-weight:700; font-style:normal; text-shadow:none; }

  /* floating particles layer */
  #particles { position:fixed; inset:0; pointer-events:none; z-index:8; overflow:hidden; }

  /* sparkle glints */
  .sparkle {
    position:fixed; pointer-events:none; z-index:7;
    width:4px; height:4px; border-radius:50%;
    background:rgba(255,230,240,0.9);
    box-shadow:0 0 6px 3px rgba(255,180,210,0.7);
    animation:sparkleAnim var(--dur,2s) ease-in-out infinite var(--delay,0s);
    opacity:0;
  }
  @keyframes sparkleAnim {
    0%,100%{ opacity:0; transform:scale(0.5); }
    50%{ opacity:1; transform:scale(1.4); }
  }
</style>
</head>
<body>

<div class="bg" id="bgBW"></div>
<div class="bg" id="bgCol"></div>
<div class="vignette" id="vignette"></div>
<div id="heartGlow"></div>
<div id="particles"></div>

<div class="center">
  <div class="heart-wrap" id="heartWrap" role="button" tabindex="0" aria-label="Click to fill the heart">
    <canvas id="c" width="500" height="500"></canvas>
  </div>
  <!-- FINGER TAP ICON -->
  <div class="tap-icon" id="sticker" aria-hidden="true">
    <svg viewBox="0 0 128 128" class="finger-svg">
      <path
        d="
        M64 16
        C58 16 54 20 54 26
        V62

        L46 56
        C41 52 34 53 30 58
        C26 63 27 70 32 75

        L52 97
        C57 103 64 106 72 106
        H82
        C98 106 110 94 110 78
        V46

        C110 40 106 36 100 36
        C96 36 92 38 90 42

        V34
        C90 28 86 24 80 24
        C76 24 72 26 70 30

        V26
        C70 20 66 16 64 16
        Z
        "
        class="finger"
      />
      <!-- CLICK LINES -->
      <circle cx="64" cy="10" r="4" class="spark"/>
      <line x1="64" y1="0" x2="64" y2="-10" class="click-line"/>
      <line x1="82" y1="10" x2="92" y2="2" class="click-line"/>
      <line x1="46" y1="10" x2="36" y2="2" class="click-line"/>
    </svg>
  </div>
  <p class="text-label" id="text1">Click to fill my heart</p>
  <p class="text-label" id="text2">Tap again… but be gentle,<br>it's very sensitive.</p>
</div>

<script>
// ── Canvas setup ──
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W=500, H=500, CX=250, CY=260;

function buildClipHeart(c2) {
  const s=1.0, ox=CX, oy=CY;
  c2.beginPath();
  c2.moveTo(ox,           oy-30*s);
  c2.bezierCurveTo(ox-5*s,oy-80*s,ox-75*s,oy-85*s,ox-90*s,oy-45*s);
  c2.bezierCurveTo(ox-110*s,oy-5*s,ox-90*s,oy+35*s,ox,oy+100*s);
  c2.bezierCurveTo(ox+90*s,oy+35*s,ox+110*s,oy-5*s,ox+90*s,oy-45*s);
  c2.bezierCurveTo(ox+75*s,oy-85*s,ox+5*s,oy-80*s,ox,oy-30*s);
  c2.closePath();
}

const HTOP=CY-85, HBOT=CY+100, HRANGE=HBOT-HTOP;
const HLEFT=CX-110, HRIGHT=CX+110;
function fillY(lv){ return HBOT - HRANGE*lv; }

// seeded jitter
function seedJit(seed,n){
  const a=[]; let s=seed;
  for(let i=0;i<n;i++){ s=(s*1664525+1013904223)&0xffffffff; a.push(((s&0xffff)/0xffff-0.5)*2); }
  return a;
}
const SEEDS=[42,137,291];

// State
let fillLevel=0, targetFill=0;
let waveOffset=0, waveAmp=0, waveDisp=0;
let clicks=0, colorized=false;
const CLICKS_TO_FULL=5;
const bubbles=[], drips=[];
// color progress 0=BW 1=full pink
let colorProgress=0, targetColor=0;

function lerpColor(t){
  // outline: white/grey -> deep rose
  const r=(220+35*t)|0, g=(200-140*t)|0, b=(205-120*t)|0;
  return {r,g,b};
}

function liquidColor(alpha){
  const t=Math.min(fillLevel,1);
  const r=(160+65*t)|0, g=(40+55*t)|0, b=(65+55*t)|0;
  return `rgba(${r},${g},${b},${alpha})`;
}

function waveSurface(baseY,amp,offset){
  const pts=[],steps=100;
  for(let i=0;i<=steps;i++){
    const x=i/steps, px=HLEFT+x*(HRIGHT-HLEFT);
    const w=Math.sin(x*Math.PI*2.4+offset)*amp
           +Math.sin(x*Math.PI*4.1+offset*1.3)*amp*0.4
           +Math.sin(x*Math.PI*1.0+offset*0.6)*amp*0.25;
    pts.push({x:px,y:baseY+w});
  }
  return pts;
}

function drawLiquid(){
  if(fillLevel<=0.001) return;
  const baseY=fillY(fillLevel)+waveDisp;
  const pts=waveSurface(baseY,waveAmp*16,waveOffset);

  ctx.save();
  buildClipHeart(ctx); ctx.clip();

  // Watercolor fill
  const grad=ctx.createLinearGradient(0,HBOT,0,HTOP);
  grad.addColorStop(0,  liquidColor(0.95));
  grad.addColorStop(0.5,liquidColor(0.85));
  grad.addColorStop(1, `rgba(240,110,145,0.8)`);
  ctx.fillStyle=grad;

  ctx.beginPath();
  ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++){
    const p=pts[i-1],c=pts[i];
    ctx.quadraticCurveTo(p.x,p.y,(p.x+c.x)/2,(p.y+c.y)/2);
  }
  ctx.lineTo(HRIGHT+15,HBOT+15); ctx.lineTo(HLEFT-15,HBOT+15); ctx.closePath();
  ctx.fill();

  // watercolor wash overlays
  [[CX-30,CY+20,90,0.13],[CX+40,CY-10,65,0.1]].forEach(([rx,ry,rad,a])=>{
    const wc=ctx.createRadialGradient(rx,ry,8,rx,ry,rad);
    wc.addColorStop(0,`rgba(220,90,130,${fillLevel*a})`);
    wc.addColorStop(1,`rgba(220,90,130,0)`);
    ctx.fillStyle=wc; ctx.fillRect(0,0,W,H);
  });

  // surface foam
  ctx.strokeStyle=`rgba(255,215,230,0.3)`; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++){
    const p=pts[i-1],c=pts[i];
    ctx.quadraticCurveTo(p.x,p.y,(p.x+c.x)/2,(p.y+c.y)/2);
  }
  ctx.stroke();

  // shimmer
  const shim=ctx.createRadialGradient(CX-40,CY-50,0,CX-40,CY-50,60);
  shim.addColorStop(0,`rgba(255,235,245,${fillLevel*0.2})`);
  shim.addColorStop(1,`rgba(255,235,245,0)`);
  ctx.fillStyle=shim; ctx.fillRect(0,0,W,H);

  // bubbles
  for(const b of bubbles){
    ctx.strokeStyle=`rgba(255,195,215,${b.life*0.5})`; ctx.lineWidth=0.8;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle=`rgba(255,230,242,${b.life*0.3})`;
    ctx.beginPath(); ctx.arc(b.x-b.r*0.3,b.y-b.r*0.3,b.r*0.3,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();

  // drips
  for(const d of drips){
    if(d.alpha<=0) continue;
    ctx.beginPath(); ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(185,50,85,${d.alpha})`; ctx.fill();
  }
}

function drawOutline(){
  const cp=Math.min(colorProgress,1);
  for(let pass=0;pass<3;pass++){
    const jitters=seedJit(SEEDS[pass],40);
    let ji=0; const jit=()=>jitters[ji++%40];
    const roughness=[3.5,2.0,1.2][pass];
    const lw=[2.8,1.8,1.0][pass];
    const offset=[0,3,-2][pass];
    const ox=CX+offset, oy=CY+(pass===0?1:0);

    // BW→pink outline transition
    const baseAlpha=[0.82,0.6,0.38][pass];
    let strokeColor;
    if(cp<0.01){
      strokeColor=`rgba(220,210,215,${baseAlpha})`;
    } else {
      const c=lerpColor(cp);
      strokeColor=`rgba(${c.r},${c.g},${c.b},${baseAlpha})`;
    }

    ctx.beginPath();
    ctx.moveTo(ox, oy-30+roughness*jit());
    ctx.bezierCurveTo(ox-5+roughness*jit(),oy-80+roughness*jit(),ox-75+roughness*jit(),oy-85+roughness*jit(),ox-90+roughness*jit(),oy-45+roughness*jit());
    ctx.bezierCurveTo(ox-110+roughness*jit(),oy-5+roughness*jit(),ox-90+roughness*jit(),oy+35+roughness*jit(),ox+roughness*jit(),oy+100+roughness*jit());
    ctx.bezierCurveTo(ox+90+roughness*jit(),oy+35+roughness*jit(),ox+110+roughness*jit(),oy-5+roughness*jit(),ox+90+roughness*jit(),oy-45+roughness*jit());
    ctx.bezierCurveTo(ox+75+roughness*jit(),oy-85+roughness*jit(),ox+5+roughness*jit(),oy-80+roughness*jit(),ox,oy-30+roughness*jit());
    ctx.closePath();

    // inner glow ring when filling
    if(pass===0 && fillLevel>0.3){
      ctx.strokeStyle=`rgba(255,170,205,${(fillLevel-0.3)*0.35})`;
      ctx.lineWidth=6; ctx.stroke();
    }
    ctx.strokeStyle=strokeColor; ctx.lineWidth=lw;
    ctx.lineJoin='round'; ctx.lineCap='round'; ctx.stroke();
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);
  drawLiquid();
  drawOutline();
}

function tick(){
  const diff=targetFill-fillLevel;
  fillLevel+=Math.abs(diff)>0.0003?diff*0.028:diff;

  const cdiff=targetColor-colorProgress;
  colorProgress+=Math.abs(cdiff)>0.001?cdiff*0.015:cdiff;

  waveOffset+=0.036;
  waveAmp+=(0-waveAmp)*0.034;
  waveDisp+=(0-waveDisp)*0.042;

  for(let i=bubbles.length-1;i>=0;i--){
    const b=bubbles[i]; b.y+=b.vy; b.life-=1/b.maxLife;
    if(b.life<=0||b.y<fillY(fillLevel)-5) bubbles.splice(i,1);
  }
  if(fillLevel>0.05&&Math.random()<0.04){
    for(let i=0;i<Math.floor(Math.random()*3)+1;i++){
      bubbles.push({x:CX+(Math.random()-0.5)*70,y:fillY(fillLevel)+Math.random()*35,
        r:Math.random()*3.5+1.2,vy:-(Math.random()*0.55+0.18),life:1,maxLife:55+Math.random()*55});
    }
  }
  for(let i=drips.length-1;i>=0;i--){
    const d=drips[i]; d.y+=d.vy; d.vy+=0.14; d.r*=0.987; d.alpha-=0.017;
    if(d.alpha<=0) drips.splice(i,1);
  }
  draw();
  requestAnimationFrame(tick);
}
tick();

// ── Particles ──
const particlesCont=document.getElementById('particles');
function spawnParticles(count,cx,cy){
  cx=cx||window.innerWidth/2; cy=cy||window.innerHeight/2;
  for(let i=0;i<count;i++){
    setTimeout(()=>{
      const p=document.createElement('div');
      const isPetal=Math.random()>0.4;
      const size=isPetal?(Math.random()*10+5):(Math.random()*5+2);
      const cols=['rgba(255,140,175,0.88)','rgba(255,190,215,0.78)','rgba(245,100,145,0.8)','rgba(255,220,235,0.7)','rgba(220,70,115,0.85)'];
      const col=cols[Math.floor(Math.random()*cols.length)];
      const angle=Math.random()*Math.PI*2;
      const dist=Math.random()*300+80;
      const tx=Math.cos(angle)*dist, ty=Math.sin(angle)*dist-60;
      const dur=Math.random()*2000+1400;
      const rot=Math.random()*720-360;
      Object.assign(p.style,{
        position:'fixed',left:cx+'px',top:cy+'px',
        width:size+'px',height:(isPetal?size*1.55:size)+'px',
        background:col,borderRadius:isPetal?'50% 50% 50% 0':'50%',
        pointerEvents:'none',zIndex:'15',opacity:'0',
        transform:`translate(-50%,-50%) rotate(${Math.random()*360}deg)`,
        transition:`transform ${dur}ms cubic-bezier(0.12,0.85,0.3,1),opacity ${dur}ms ease`
      });
      document.body.appendChild(p);
      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        p.style.opacity='1';
        p.style.transform=`translate(calc(-50% + ${tx}px),calc(-50% + ${ty}px)) rotate(${rot}deg)`;
        setTimeout(()=>{p.style.opacity='0';setTimeout(()=>p.remove(),600);},dur*0.55);
      }));
    },i*18);
  }
}

function bloomRing(delay,size,color){
  setTimeout(()=>{
    const r=document.createElement('div');
    Object.assign(r.style,{
      position:'fixed',left:'50%',top:'50%',
      width:size+'px',height:size+'px',
      border:`1.5px solid ${color}`,borderRadius:'50%',
      transform:'translate(-50%,-50%) scale(0)',
      transition:'transform 1.3s cubic-bezier(0.15,0.85,0.35,1),opacity 1.3s ease',
      opacity:'0.7',pointerEvents:'none',zIndex:'12'
    });
    document.body.appendChild(r);
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      r.style.transform='translate(-50%,-50%) scale(1)';
      r.style.opacity='0';
      setTimeout(()=>r.remove(),1400);
    }));
  },delay);
}

// Floating sparkles that appear after colorize
function addSparkles(){
  const positions=[[20,15],[75,10],[12,70],[80,75],[50,20],[18,50],[82,45],[60,80],[35,88],[90,30]];
  positions.forEach(([lp,tp],i)=>{
    setTimeout(()=>{
      const sp=document.createElement('div');
      sp.className='sparkle';
      sp.style.cssText=`left:${lp}%;top:${tp}%;--dur:${2+Math.random()*2}s;--delay:${Math.random()*1.5}s;`;
      document.body.appendChild(sp);
    },i*200);
  });
}

function spawnDrip(){
  const angle=Math.random()*Math.PI*2;
  const x=16*Math.pow(Math.sin(angle),3)*190/16;
  const y=-(13*Math.cos(angle)-5*Math.cos(2*angle)-2*Math.cos(3*angle)-Math.cos(4*angle))*190/16;
  drips.push({x:CX+x+(Math.random()-0.5)*8,y:CY+y+(Math.random()-0.5)*8,
    r:Math.random()*3.5+2,vy:Math.random()*0.9+0.4,alpha:0.65+Math.random()*0.3});
}

// ── Big colorize transition ──
function doColorize(){
  if(colorized) return;
  colorized=true;
  targetColor=1;

  // BG crossfade BW → color
  document.getElementById('bgCol').style.opacity='1';

  // vignette soften
  const vig=document.getElementById('vignette');
  vig.style.transition='opacity 3s ease';
  setTimeout(()=>{ vig.style.background='radial-gradient(ellipse at center,transparent 25%,rgba(100,0,30,0.25) 100%)'; },200);

  // heart glow
  setTimeout(()=>{ document.getElementById('heartGlow').classList.add('lit'); },400);

  // bloom rings
  bloomRing(0,   280,'rgba(255,140,185,0.55)');
  bloomRing(250, 460,'rgba(255,160,200,0.38)');
  bloomRing(550, 680,'rgba(255,180,215,0.22)');
  bloomRing(900,1000,'rgba(255,200,230,0.12)');

  // big particle burst
  spawnParticles(80);

  // sparkle dots scattered on page
  setTimeout(addSparkles,800);

  // text swap
  document.getElementById('text1').classList.add('colorful');
  setTimeout(()=>{
    document.getElementById('text1').classList.add('hide');
    setTimeout(()=>document.getElementById('text2').classList.add('show'),900);
  },600);

  // glowing heart
  document.getElementById('heartWrap').classList.add('glowing');
}

// ── Click ──
const heartWrap=document.getElementById('heartWrap');
function onClick(){
  clicks++;
  waveAmp=Math.min(waveAmp+0.6,1); waveDisp=-9;
  targetFill=Math.min(targetFill+1/CLICKS_TO_FULL,1);
  // color progress inches ahead with each click
  targetColor=Math.min((clicks-1)/(CLICKS_TO_FULL-1)*0.3,0.3);

  for(let i=0;i<3;i++) setTimeout(spawnDrip,i*75);
  spawnParticles(Math.min(12+clicks*8,60));
  bloomRing(0,120+clicks*32,`rgba(255,120,170,${Math.min(0.25+clicks*0.08,0.6)})`);

  if(clicks>=CLICKS_TO_FULL && !colorized){
    setTimeout(doColorize,600);
  } else if(clicks>CLICKS_TO_FULL){
    spawnParticles(35);
    bloomRing(0,200,'rgba(255,130,175,0.5)');
    heartWrap.style.transition='transform 0.12s ease';
    heartWrap.style.transform='scale(0.93)';
    setTimeout(()=>{ heartWrap.style.transform='scale(1)'; },130);
    setTimeout(startPinkWaveTransition, 280);
  }
}

heartWrap.addEventListener('click',onClick);
heartWrap.addEventListener('keydown',e=>{
  if(e.key==='Enter'||e.key===' '){ e.preventDefault(); onClick(); }
});

// ── Cinematic pink wave transition ──
function startPinkWaveTransition(){
  // Create overlay container
  const ov=document.createElement('div');
  ov.id='pink-wave-ov';
  Object.assign(ov.style,{
    position:'fixed',inset:'0',zIndex:'9999',pointerEvents:'none',overflow:'hidden',
  });
  document.body.appendChild(ov);

  // SVG wave that sweeps across
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 100 100');
  svg.setAttribute('preserveAspectRatio','none');
  Object.assign(svg.style,{
    position:'absolute',inset:'0',width:'100%',height:'100%',
  });

  // Three layered wave fills
  const layers=[
    {color:'#FFD1DC',delay:0,   duration:820},
    {color:'#FFC0CB',delay:120, duration:780},
    {color:'#FFB6C1',delay:230, duration:740},
  ];

  layers.forEach(({color,delay,duration})=>{
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('fill',color);
    // start off-screen left with wavy right edge
    path.setAttribute('d','M-10,0 Q-5,50 -10,100 L-10,100 L-10,0 Z');
    path.style.transition=`d ${duration}ms cubic-bezier(0.76,0,0.24,1) ${delay}ms, opacity 300ms ease ${delay+duration}ms`;
    svg.appendChild(path);

    // Animate with JS since CSS `d` transitions have limited support
    setTimeout(()=>{
      // Use canvas-based animation for the wave sweep
      let start=null;
      function animWave(ts){
        if(!start) start=ts;
        const t=Math.min((ts-start)/duration,1);
        const ease=t<0.5?4*t*t*t:(t-1)*(2*t-2)*(2*t-2)+1; // ease in-out cubic
        const x=ease*120-10; // -10 → 110 (past right edge)
        // wavy right edge
        const w1=8*Math.sin(t*Math.PI*3);
        const w2=5*Math.sin(t*Math.PI*5+1);
        const d=`M-10,0 Q${x-5+w1},25 ${x+w2},50 Q${x-3+w1},75 ${x+w2},100 L-10,100 Z`;
        path.setAttribute('d',d);
        if(t<1) requestAnimationFrame(animWave);
      }
      requestAnimationFrame(animWave);
    },delay);
  });
  ov.appendChild(svg);

  // Floating heart particles on the wave
  function spawnTransitionHeart(){
    const h=document.createElement('div');
    const size=12+Math.random()*18;
    const startX=Math.random()*100;
    const dur=700+Math.random()*600;
    Object.assign(h.style,{
      position:'absolute',
      left:startX+'%',
      top:(20+Math.random()*60)+'%',
      fontSize:size+'px',
      opacity:'0',
      transform:'translateY(0) scale(0.5)',
      transition:`opacity ${dur}ms ease, transform ${dur}ms cubic-bezier(0.2,0.9,0.25,1)`,
      pointerEvents:'none',
      filter:'drop-shadow(0 0 8px rgba(255,90,162,0.6))',
    });
    h.textContent='❤️';
    ov.appendChild(h);
    setTimeout(()=>{
      h.style.opacity='0.85';
      h.style.transform=`translateY(-${20+Math.random()*40}px) scale(1)`;
    },30);
    setTimeout(()=>{ h.style.opacity='0'; },dur*0.7);
    setTimeout(()=>h.remove(),dur+200);
  }
  for(let i=0;i<14;i++) setTimeout(spawnTransitionHeart, i*80+100);

  // Blur & fade the content beneath
  const center=document.querySelector('.center');
  if(center){
    center.style.transition='filter 0.5s ease, opacity 0.5s ease';
    center.style.filter='blur(8px)';
    center.style.opacity='0';
  }

  // Navigate when wave has fully covered the screen
  setTimeout(()=>{ window.location.href='page2.html'; }, 1150);
}

</script>
</body>
</html>
