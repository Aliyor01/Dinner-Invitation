<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Wait...</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:'Cormorant Garamond',Georgia,serif}
    body{
      min-height:100vh;overflow:hidden;
      background:linear-gradient(135deg,#ffd6ed,#e8d5ff);
      display:flex;align-items:center;justify-content:center;
    }
    canvas{position:fixed;inset:0;pointer-events:none;z-index:0}
    .scene{position:relative;z-index:2;text-align:center;padding:40px 24px;max-width:640px}

    @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}

    .line{
      display:block;font-size:clamp(22px,5.5vw,42px);color:#2b0f2f;
      line-height:1.35;margin-bottom:10px;
      opacity:0;transform:translateY(16px);transition:opacity .7s cubic-bezier(.2,.9,.25,1),transform .7s cubic-bezier(.2,.9,.25,1);
    }
    .line.show{opacity:1;transform:none}
    .line em{font-style:italic;color:#c4407a}

    .cursor{
      display:inline-block;width:2px;height:1em;background:#c4407a;
      vertical-align:middle;margin-left:2px;
      animation:blink .7s steps(1) infinite;
    }
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

    .btn-cont{
      font-family:inherit;font-size:clamp(17px,3.5vw,22px);font-weight:400;
      padding:14px 40px;border-radius:50px;border:none;cursor:pointer;
      background:linear-gradient(135deg,#ff5aa2,#ff9ed2);
      color:#fff;letter-spacing:.3px;
      box-shadow:0 8px 32px rgba(255,90,162,.3);
      opacity:0;transform:translateY(12px) scale(.95);
      transition:opacity .6s,transform .6s,box-shadow .2s;
      margin-top:32px;
    }
    .btn-cont.show{opacity:1;transform:none}
    .btn-cont:hover{box-shadow:0 14px 44px rgba(255,90,162,.45);transform:translateY(-2px) scale(1.04)!important}
    .btn-cont:active{transform:scale(.97)!important}
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <main class="scene">
    <span class="line" id="l1"></span>
    <span class="line" id="l2"></span>
    <span class="line" id="l3"></span>
    <span class="line" id="l4"></span>
    <button class="btn-cont" id="cont">Continue ➜</button>
  </main>
  <script>
  (function(){
    const cv=document.getElementById('c'),ctx=cv.getContext('2d');
    let W,H;function rs(){W=cv.width=innerWidth;H=cv.height=innerHeight}rs();addEventListener('resize',rs);
    const ps=[];function sp(x,y){ps.push({x,y,vx:(Math.random()-.5)*.8,vy:(Math.random()-.7)*1,life:100+Math.random()*60,size:Math.random()*5+3,h:340+Math.random()*20})}
    for(let i=0;i<35;i++) sp(Math.random()*innerWidth,Math.random()*innerHeight);
    function loop(){ctx.clearRect(0,0,W,H);
      ps.forEach((p,i)=>{p.x+=p.vx;p.y+=p.vy;p.life--;
        ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fillStyle=`hsla(${p.h},80%,72%,${Math.max(0,p.life/160)})`;ctx.fill();
        if(p.type!=='d'&&p.life<0)ps.splice(i,1);
        if(p.y<-5)p.y=H+5;if(p.x<-5)p.x=W+5;if(p.x>W+5)p.x=-5;
      });requestAnimationFrame(loop);}loop();

    /* typing lines */
    const lines=[
      {id:'l1',text:'Wait…'},
      {id:'l2',text:'Did you actually press YES? 😳'},
      {id:'l3',text:'Honestly, I was preparing for much tougher negotiations 😂'},
      {id:'l4',text:'Well… there\'s no turning back now.'},
    ];
    let lineIdx=0;
    function showNextLine(){
      if(lineIdx>=lines.length){
        setTimeout(()=>document.getElementById('cont').classList.add('show'),300);
        return;
      }
      const {id,text}=lines[lineIdx++];
      const el=document.getElementById(id);
      el.classList.add('show');
      // type out the text
      el.innerHTML='<span class="cursor"></span>';
      let i=0;
      const cur=el.querySelector('.cursor');
      function type(){
        if(i<text.length){
          cur.insertAdjacentText('beforebegin',text[i]);i++;
          setTimeout(type,38+Math.random()*28);
        } else {
          cur.remove();
          setTimeout(showNextLine,900);
        }
      }
      setTimeout(type,120);
    }
    setTimeout(showNextLine,600);

    document.getElementById('cont').addEventListener('click',()=>{
      document.body.style.transition='opacity .5s';document.body.style.opacity=0;
      setTimeout(()=>location.href='page4.html',500);
    });
  })();
  </script>
</body>
</html>
